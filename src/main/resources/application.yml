server:
  port: 8081


spring:
  application:
    name: usuarios

  datasource:
    url: jdbc:mysql://localhost:3306/db_usuarios?useSSL=false&serverTimezone=UTC

    username: root
    password:

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect

    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    open-in-view: false

  flyway:
    enabled: true


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


